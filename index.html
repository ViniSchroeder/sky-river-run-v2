<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><link rel="stylesheet" href="./css/styles.css?v=4001"><title>Sky River Run 4.0</title></head><body>
<canvas id="game"></canvas>
<header id="hud" class="hud hidden"><div class="meter panel"><b>COMBUSTÍVEL</b><div id="fuel" class="segments"></div></div><div class="panel">❤️ <span id="lives">3</span></div><div class="panel">🛡️ <span id="shield">0</span></div><div class="panel">🔫 <span id="weapon">1</span></div><div class="panel">💣 <span id="bombs">0</span></div><div class="panel score"><span id="score">0</span></div></header>
<div class="top"><button id="pause">Ⅱ</button><button id="sound">🔊</button></div>
<main id="menu" class="overlay"><section class="card"><small>PIXEL ARCADE EDITION</small><h1>SKY<br><span>RIVER</span><br>RUN</h1><p>Fases, pontes, upgrades e chefes.</p><button id="play">INICIAR MISSÃO</button></section></main>
<section id="over" class="overlay hidden"><div class="card"><h2>GAME OVER</h2><p id="final"></p><button id="restart">REINICIAR</button></div></section>
<section id="paused" class="overlay hidden"><div class="card"><h2>PAUSADO</h2><button id="resume">CONTINUAR</button></div></section>
<div id="msg" class="msg"></div><div id="stage" class="stage"></div>
<div id="joy" class="joy hidden"><div id="knob"></div></div><div class="actions"><button id="bomb">💣</button><button id="fire">🔥</button></div>
<script type="module" src="./js/game.js?v=4001"></script></body></html>
